name: Build and deploy Node.js backend to Azure Web App - safecheck-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install backend dependencies
        working-directory: ./server
        run: npm install --production

      - name: Assemble deployment package
        run: |
          mkdir -p deploy/shared
          cp -r server/. deploy/
          cp -r shared/. deploy/shared/

      - name: Upload server folder as artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_71D3D2E7FE104EF890CFAFE3C3E05012 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9B5C2A1A5D864C0F86E18A5CB64974C2 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6857F1F2829E4AD08D211E5017EAE92D }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'safecheck-api'
          slot-name: 'Production'
          package: .